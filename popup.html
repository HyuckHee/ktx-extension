<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>KTX 자동 예매</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0a0e1a;
      color: #e8eaf0;
      width: 280px;
    }

    .header {
      background: linear-gradient(135deg, #0066cc, #003d99);
      padding: 18px 20px 14px;
    }
    .header-top { display:flex; align-items:center; gap:10px; }
    .title { font-size:15px; font-weight:700; color:#fff; }
    .subtitle { font-size:11px; color:rgba(255,255,255,0.6); margin-top:2px; }

    .content { padding:16px; }

    .guide {
      background:#0d1525;
      border:1px solid #1a2d4a;
      border-radius:8px;
      padding:12px 14px;
      font-size:11px;
      color:#a8c8e8;
      line-height:1.8;
      margin-bottom:14px;
    }
    .guide strong { color:#4da6ff; }

    .log-label { font-size:10px; color:#7a98b8; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
    .log-box {
      background:#070d1a; border:1px solid #1e3050;
      border-radius:6px; height:180px; overflow-y:auto;
      padding:8px; font-size:10px; font-family:'Courier New',monospace; line-height:1.7;
    }
    .log-box::-webkit-scrollbar { width:3px; }
    .log-box::-webkit-scrollbar-thumb { background:#1e2d4a; border-radius:2px; }
    .log-entry { color:#7a9ab8; }
    .log-entry.info { color:#4da6ff; }
    .log-entry.success { color:#00e676; }
    .log-entry.warn { color:#ffb300; }
    .log-entry.error { color:#ff5252; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <span style="font-size:22px">🚄</span>
      <div>
        <div class="title">KTX 자동 예매</div>
        <div class="subtitle">빈자리 감지 · 자동 예매</div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="guide">
      <strong>사용법</strong><br>
      1. 코레일 예매 페이지 열기 &amp; 로그인<br>
      2. 원하는 날짜/구간 검색<br>
      3. 하단 퀵바에서 ▶ 시작 클릭<br>
      <br>
      <strong>옵션 (퀵바)</strong><br>
      · 입석: 입석+좌석 포함 예매<br>
      · 예약대기: 매진 시 예약대기 신청
    </div>

    <div class="log-label">실행 로그</div>
    <div class="log-box" id="logBox">
      <div class="log-entry">시작 버튼을 눌러주세요.</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
